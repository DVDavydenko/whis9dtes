<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
  <title>EdHistory: комплексне оцінювання</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=Merriweather:ital,wght@0,300;0,700;1,300&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Inter', sans-serif; background: #f8fafc; color: #0f172a; }
    h1, h2, h3, .serif { font-family: 'Merriweather', serif; }
    .chart-container { position: relative; width: 100%; max-width: 600px; margin: 0 auto; height: 200px; }
    .fade-in { animation: fadeIn 0.4s; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    .radio-custom:checked + label, .checkbox-custom:checked + label { background: #e0e7ff; border-color: #4f46e5; color: #3730a3; font-weight: 600; }
    .sticky-timer { position: sticky; top: 0; z-index: 50; backdrop-filter: blur(8px); }
    @media (max-width: 640px) {
      .grid-cols-1-sm { grid-template-columns: 1fr !important; }
    }
  </style>
</head>
<body class="h-screen flex flex-col overflow-hidden text-slate-800">

<header class="bg-indigo-900 text-white shadow-md z-10 flex-shrink-0">
  <div class="max-w-7xl mx-auto px-4 h-16 flex items-center justify-between">
    <div class="flex items-center space-x-2">
      <span class="text-2xl">🏛️</span>
      <span class="text-xl font-bold serif">EdHistory</span>
      <span class="text-xs bg-indigo-700 px-2 py-1 rounded ml-2 hidden sm:inline-block">PRO</span>
    </div>
    <div id="user-info" class="hidden text-sm font-medium flex items-center">
      <span id="role-badge" class="bg-indigo-600 px-3 py-1 rounded-full mr-4"></span>
      <button onclick="logout()" class="text-indigo-300 hover:text-white">🚪 Вийти</button>
    </div>
  </div>
</header>

<main class="flex-1 overflow-y-auto relative bg-slate-50" id="app-container"></main>

<script>
  (function(){
    // 🔹🔹🔹 ВСТАВТЕ СЮДИ URL ВАШОГО РОЗГОРНУТОГО GAS ВЕБ-ДОДАТКУ 🔹🔹🔹
    const GAS_URL = 'https://script.google.com/macros/s/AKfycbz6jiOa6fLLzSiInyuZ_P1mB4n8BFSv1db0x4MpRhhBhbUFH-jaqhreme_EOJCmfteu8w/exec';
    
    const TEACHER_PASSWORD = 'whis9dt';
    const COMPLETED_KEY = 'edhistory_completed';

    let appState = {
      role: null, studentName: '', sessionId: null, currentVariant: null,
      timerInterval: null, timeLeft: 0, startTime: null, answers: {},
      openActionsCount: 0
    };

    const container = document.getElementById('app-container');

    // ========== АВТОРИЗАЦІЯ ==========
    window.login = function(role) {
      if (role === 'teacher') {
        const pwd = prompt("Введіть пароль вчителя:");
        if (pwd !== TEACHER_PASSWORD) { alert("Невірний пароль!"); return; }
        appState.role = 'teacher';
        document.getElementById('user-info').classList.remove('hidden');
        document.getElementById('role-badge').innerText = '👨‍🏫 Вчитель';
        renderTeacherDashboard();
      } else {
        const name = document.getElementById('student-name')?.value.trim();
        if (!name) { alert("Введіть ім'я"); return; }
        if (JSON.parse(localStorage.getItem(COMPLETED_KEY) || '[]').includes(name)) {
          alert("Ви вже проходили тест. Повторне проходження заборонено.");
          return;
        }
        appState.role = 'student';
        appState.studentName = name;
        document.getElementById('user-info').classList.remove('hidden');
        document.getElementById('role-badge').innerText = '🎒 ' + name;
        startTest();
      }
    };

    window.logout = function() {
      clearInterval(appState.timerInterval);
      appState = { role: null, studentName: '', sessionId: null, currentVariant: null, timerInterval: null, timeLeft: 0, startTime: null, answers: {}, openActionsCount: 0 };
      renderLogin();
    };

    function renderLogin() {
      document.getElementById('user-info').classList.add('hidden');
      container.innerHTML = `
        <div class="min-h-full flex items-center justify-center p-4 fade-in">
          <div class="bg-white p-6 sm:p-8 rounded-2xl shadow-xl w-full max-w-md">
            <h1 class="text-2xl sm:text-3xl font-bold serif mb-2">Авторизація</h1>
            <p class="text-slate-500 mb-4">Система комплексного оцінювання</p>
            <button onclick="login('teacher')" class="w-full py-3 bg-indigo-600 text-white rounded mb-3">👨‍🏫 Вхід для Вчителя</button>
            <div class="bg-slate-50 p-4 rounded border">
              <label class="block text-sm mb-1">Приєднання до тестування</label>
              <input type="text" id="student-name" class="w-full border p-3 rounded mb-3" placeholder="Прізвище та Ім'я">
              <button onclick="login('student')" class="w-full py-3 bg-emerald-600 text-white rounded">🎒 Почати тест (40 хв)</button>
            </div>
          </div>
        </div>`;
    }

    // ========== ТЕСТУВАННЯ ==========
    async function startTest() {
      try {
        const res = await fetch(GAS_URL);
        const data = await res.json();
        if (data.error) throw new Error(data.error);
        
        appState.sessionId = data.sessionId;
        appState.currentVariant = data.variant;
        appState.startTime = data.startTime;
        appState.timeLeft = data.variant.duration;
        appState.openActionsCount = 0;
        
        renderTest();
        startTimer();
      } catch (e) {
        alert('Помилка завантаження тесту: ' + e.message);
        logout();
      }
    }

    function renderTest() {
      const variant = appState.currentVariant;
      let html = `
        <div class="sticky-timer bg-white/90 border-b py-2 px-4 flex flex-wrap justify-between items-center">
          <div class="font-bold text-sm sm:text-base truncate">${variant.title}</div>
          <div class="flex items-center space-x-2 sm:space-x-3">
            <span class="text-xs sm:text-sm">Залишилось:</span>
            <div id="timer-display" class="bg-indigo-100 text-indigo-800 font-mono text-base sm:text-lg px-2 sm:px-3 py-1 rounded">${formatTime(appState.timeLeft)}</div>
            <button onclick="submitTest()" class="bg-indigo-600 text-white px-3 sm:px-4 py-1.5 rounded text-sm">Здати</button>
          </div>
        </div>
        <div class="max-w-4xl mx-auto p-3 sm:p-4 space-y-6">`;
      
      variant.sections.forEach((sec, idx) => {
        html += `<div class="bg-white rounded-xl shadow-sm border"><div class="bg-slate-800 text-white px-4 sm:px-6 py-3"><h2 class="text-lg sm:text-xl">${sec.title}</h2><p class="text-xs sm:text-sm opacity-80">${sec.desc}</p></div><div class="p-4 sm:p-6 space-y-4">`;
        
        if (sec.type === 'mcq') {
          sec.questions.forEach((q, i) => {
            html += `<div class="border-b pb-3"><p class="font-semibold text-sm sm:text-base">${i+1}. ${q.q}</p><div class="grid grid-cols-1 sm:grid-cols-2 gap-2 mt-2">`;
            q.options.forEach((opt, oIdx) => {
              html += `<div><input type="radio" name="${q.id}" id="${q.id}_${oIdx}" value="${oIdx}" class="peer hidden radio-custom">
                <label for="${q.id}_${oIdx}" class="block p-3 border rounded cursor-pointer hover:bg-slate-50 peer-checked:bg-indigo-50 peer-checked:border-indigo-500 text-sm">${opt}</label></div>`;
            });
            html += `</div></div>`;
          });
        } else if (sec.type === 'matching' || sec.type === 'dragdrop') {
          const d = sec.data;
          html += `<div><p class="font-semibold text-sm sm:text-base">${d.q}</p><div class="space-y-3 mt-2">`;
          d.items.forEach((item, iIdx) => {
            html += `<div class="flex flex-col sm:flex-row sm:items-center gap-2"><div class="sm:w-1/2 bg-slate-50 p-2 rounded border text-sm">${item}</div>
              <div class="sm:w-1/2"><select name="${d.id}_${iIdx}" class="w-full p-2 border rounded text-sm"><option value="-1" disabled selected>-- Оберіть --</option>`;
            d.options.forEach((opt, oIdx) => html += `<option value="${oIdx}">${opt}</option>`);
            html += `</select></div></div>`;
          });
          html += `</div></div>`;
        } else if (sec.type === 'checkbox') {
          const d = sec.data;
          html += `<div><p class="font-semibold text-sm sm:text-base">${d.q}</p><div class="grid grid-cols-1 sm:grid-cols-2 gap-2 mt-2">`;
          d.options.forEach((opt, oIdx) => {
            html += `<div><input type="checkbox" name="${d.id}" id="${d.id}_${oIdx}" value="${oIdx}" class="peer hidden checkbox-custom">
              <label for="${d.id}_${oIdx}" class="block p-3 border rounded cursor-pointer hover:bg-slate-50 peer-checked:bg-indigo-50 peer-checked:border-indigo-500 text-sm">${opt}</label></div>`;
          });
          html += `</div></div>`;
        } else if (sec.type === 'blanks') {
          const d = sec.data;
          html += `<div><p class="text-sm sm:text-base">${d.textBefore} `;
          d.blanks.forEach((blank, idx) => {
            html += `<select name="${d.id}_blank${idx}" class="inline-block w-auto mx-1 p-1 border rounded text-sm">`;
            blank.options.forEach((opt, oIdx) => html += `<option value="${oIdx}">${opt}</option>`);
            html += `</select> `;
          });
          html += `${d.textAfter}</p></div>`;
        } else if (sec.type === 'shorttext') {
          const d = sec.data;
          html += `<div><p class="font-semibold text-sm sm:text-base">${d.q}</p>
            <textarea name="${d.id}" rows="3" class="w-full border rounded p-3 text-sm mt-2" placeholder="Введіть коротку відповідь..."></textarea></div>`;
        } else if (sec.type === 'sequence') {
          html += `<div class="space-y-3">`;
          [0,1,2,3].forEach(pos => {
            html += `<div class="flex items-center space-x-2"><div class="bg-indigo-100 w-7 h-7 sm:w-8 sm:h-8 flex items-center justify-center rounded-full text-sm">${pos+1}</div>
              <select name="${sec.id}_pos${pos}" class="flex-1 p-2 border rounded text-sm"><option value="" disabled selected>-- Оберіть --</option>`;
            sec.items.forEach(item => html += `<option value="${item.id}">${item.text}</option>`);
            html += `</select></div>`;
          });
          html += `</div>`;
        } else if (sec.type === 'source') {
          html += `<div class="bg-amber-50 border-l-4 border-amber-500 p-3 sm:p-4 italic text-sm">${sec.quote}<br><span class="font-bold">${sec.author}</span></div>`;
          sec.questions.forEach((q, i) => {
            html += `<div class="mt-4"><p class="font-semibold text-sm sm:text-base">${i+1}. ${q.q}</p><div class="grid grid-cols-1 gap-2 mt-2">`;
            q.options.forEach((opt, oIdx) => {
              html += `<div><input type="radio" name="${q.id}" id="${q.id}_${oIdx}" value="${oIdx}" class="peer hidden radio-custom">
                <label for="${q.id}_${oIdx}" class="block p-3 border rounded cursor-pointer hover:bg-slate-50 peer-checked:bg-indigo-50 text-sm">${opt}</label></div>`;
            });
            html += `</div></div>`;
          });
        } else if (sec.type === 'open') {
          html += `<div class="bg-slate-50 p-3 sm:p-4 rounded border text-sm">${sec.q}</div>
            <textarea id="open-answer" rows="6" class="w-full border rounded p-3 text-sm mt-3" placeholder="Ваша розгорнута відповідь..."></textarea>`;
        }
        html += `</div></div>`;
      });
      html += `<div class="text-center pt-4 pb-6"><button onclick="submitTest()" class="bg-emerald-600 text-white text-lg sm:text-xl py-3 sm:px-12 rounded-xl">Завершити тест</button></div></div>`;
      container.innerHTML = html;

      const openTextarea = document.getElementById('open-answer');
      if (openTextarea) {
        const countAction = () => { appState.openActionsCount++; };
        openTextarea.addEventListener('input', countAction);
        openTextarea.addEventListener('keydown', countAction);
        openTextarea.addEventListener('paste', countAction);
        openTextarea.addEventListener('cut', countAction);
      }
    }

    function startTimer() {
      appState.timerInterval = setInterval(() => {
        const elapsed = Math.floor((Date.now() - appState.startTime) / 1000);
        appState.timeLeft = Math.max(0, appState.currentVariant.duration - elapsed);
        const disp = document.getElementById('timer-display');
        if (disp) {
          disp.innerText = formatTime(appState.timeLeft);
          if (appState.timeLeft <= 300) disp.classList.add('bg-red-100', 'text-red-800');
        }
        if (appState.timeLeft <= 0) {
          clearInterval(appState.timerInterval);
          alert('Час вийшов!');
          submitTest();
        }
      }, 200);
    }

    function formatTime(s) {
      let m = Math.floor(s/60), sec = s%60;
      return `${m.toString().padStart(2,'0')}:${sec.toString().padStart(2,'0')}`;
    }

    function collectAnswers() {
      const answers = {};
      document.querySelectorAll('input[type="radio"]:checked').forEach(r => answers[r.name] = r.value);
      document.querySelectorAll('input[type="checkbox"]:checked').forEach(cb => {
        if (!answers[cb.name]) answers[cb.name] = [];
        answers[cb.name].push(cb.value);
      });
      document.querySelectorAll('select').forEach(s => { if (s.value && s.value !== '-1') answers[s.name] = s.value; });
      document.querySelectorAll('textarea').forEach(t => { if (t.id !== 'open-answer') answers[t.name] = t.value; });
      return answers;
    }

    window.submitTest = async function() {
      clearInterval(appState.timerInterval);
      const answers = collectAnswers();
      const openAnswer = document.getElementById('open-answer')?.value || '';
      const openActionsCount = appState.openActionsCount;
      
      try {
        const res = await fetch(GAS_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            sessionId: appState.sessionId,
            studentName: appState.studentName,
            answers: answers,
            openAnswer: openAnswer,
            openActionsCount: openActionsCount
          })
        });
        const data = await res.json();
        if (!data.success) throw new Error(data.error);
        
        const completed = JSON.parse(localStorage.getItem(COMPLETED_KEY) || '[]');
        if (!completed.includes(appState.studentName)) {
          completed.push(appState.studentName);
          localStorage.setItem(COMPLETED_KEY, JSON.stringify(completed));
        }
        
        renderStudentResults(data.closedScore, !!openAnswer);
      } catch (e) {
        alert('Помилка: ' + e.message);
        logout();
      }
    };

    function renderStudentResults(closed, hasOpen) {
      container.innerHTML = `
        <div class="h-full flex items-center justify-center p-4"><div class="bg-white p-6 sm:p-8 rounded-2xl shadow-xl max-w-lg text-center">
          <div class="text-5xl sm:text-6xl mb-4">🏆</div><h2 class="text-2xl sm:text-3xl font-bold">Тест завершено!</h2>
          <p class="mb-4 text-sm sm:text-base">Дякуємо, ${appState.studentName}.</p>
          <div class="bg-slate-50 p-4 rounded mb-4 text-left">
            <div class="flex justify-between"><span>Закрита частина:</span><span class="font-bold text-indigo-600">${closed.toFixed(2)} балів</span></div>
            <div class="flex justify-between"><span>Відкрита частина:</span><span class="${hasOpen?'text-amber-600':'text-red-600'}">${hasOpen?'Очікує перевірки':'Не виконано'}</span></div>
          </div>
          <button onclick="logout()" class="w-full py-3 bg-slate-800 text-white rounded">На головну</button>
        </div></div>`;
    }

    // ========== ПАНЕЛЬ ВЧИТЕЛЯ ==========
    async function renderTeacherDashboard() {
      try {
        const res = await fetch(GAS_URL + '?action=getResults');
        const results = await res.json();
        const total = results.length;
        const avg = total ? (results.reduce((a, r) => a + (r.openScore ? r.closedScore + r.openScore : r.closedScore), 0) / total).toFixed(2) : 0;
        
        let html = `
          <div class="max-w-7xl mx-auto p-3 sm:p-4 fade-in">
            <h1 class="text-2xl sm:text-3xl font-bold serif mb-4">Панель вчителя</h1>
            <div class="grid grid-cols-1 lg:grid-cols-3 gap-4 sm:gap-6">
              <div class="bg-white p-4 sm:p-5 rounded-xl shadow"><h3 class="font-bold text-lg">📊 Статистика</h3>
                <p>Всього робіт: ${total}</p><p>Середній бал: ${avg}</p>
                <div class="chart-container mt-4"><canvas id="scoreChart"></canvas></div>
              </div>
              <div class="lg:col-span-2 bg-white p-4 sm:p-5 rounded-xl shadow">
                <div class="flex flex-wrap justify-between items-center mb-3 gap-2">
                  <h3 class="font-bold text-lg">📋 Результати</h3>
                  <button onclick="exportToCSV()" class="bg-green-600 text-white px-4 py-2 rounded text-sm">📥 CSV</button>
                </div>
                <div class="overflow-x-auto">
                  <table class="w-full text-xs sm:text-sm">
                    <thead><tr class="bg-slate-100"><th class="p-2">Учень</th><th class="p-2">Варіант</th><th class="p-2">Закр.</th><th class="p-2">Відкр.</th><th class="p-2">Заг.</th><th class="p-2">Дії</th></tr></thead>
                    <tbody>`;
        results.forEach((r, idx) => {
          const totalScore = r.openScore ? r.closedScore + r.openScore : r.closedScore;
          html += `<tr class="border-b"><td class="p-2">${r.student}</td><td class="p-2 max-w-[120px] truncate">${r.variant}</td>
            <td class="p-2">${r.closedScore.toFixed(2)}</td><td class="p-2">${r.openScore ?? '❌'}</td><td class="p-2 font-bold">${totalScore.toFixed(2)}</td>
            <td class="p-2"><button onclick="checkOpen(${r.rowIndex})" class="bg-indigo-100 text-indigo-800 px-2 py-1 rounded text-xs">Перевірити</button></td></tr>`;
        });
        html += `</tbody></table></div></div></div></div>`;
        container.innerHTML = html;
        
        if (total > 0) {
          const ctx = document.getElementById('scoreChart').getContext('2d');
          const scores = results.map(r => r.openScore ? r.closedScore + r.openScore : r.closedScore);
          const bins = [0,2,4,6,8,10,12];
          const counts = bins.slice(0,-1).map((b,i) => scores.filter(s => s >= b && s < bins[i+1]).length);
          new Chart(ctx, { type: 'bar', data: { labels: ['0-2','2-4','4-6','6-8','8-10','10-12'], datasets: [{ label: 'Кількість', data: counts }] } });
        }
      } catch (e) { alert('Помилка завантаження результатів'); }
    }

    window.checkOpen = async function(rowIndex) {
      const res = await fetch(GAS_URL + '?action=getResults');
      const results = await res.json();
      const rec = results.find(r => r.rowIndex === rowIndex);
      if (!rec) return;
      
      container.innerHTML = `
        <div class="max-w-4xl mx-auto p-3 sm:p-4">
          <div class="bg-white rounded-xl shadow p-4 sm:p-6">
            <h2 class="text-xl font-bold mb-2">${rec.student} — ${rec.variant}</h2>
            <p class="mb-4">Закрита частина: ${rec.closedScore.toFixed(2)} балів</p>
            <div class="bg-slate-100 p-3 rounded border mb-4">
              <p class="font-semibold">Відповідь на відкрите питання:</p>
              <p class="whitespace-pre-wrap text-sm">${rec.openAnswer || '(відсутня)'}</p>
            </div>
            <label class="block mb-2">Оцінка (0–4):</label>
            <input type="number" id="open-score-input" min="0" max="4" step="0.5" value="${rec.openScore || 0}" class="border p-2 rounded w-24 mb-4">
            <div class="space-x-3">
              <button onclick="saveOpenScore(${rowIndex})" class="bg-indigo-600 text-white px-4 py-2 rounded">Зберегти</button>
              <button onclick="renderTeacherDashboard()" class="bg-slate-500 text-white px-4 py-2 rounded">Назад</button>
            </div>
          </div>
        </div>`;
    };

    window.saveOpenScore = async function(rowIndex) {
      const score = parseFloat(document.getElementById('open-score-input').value);
      if (isNaN(score) || score < 0 || score > 4) { alert('Введіть число від 0 до 4'); return; }
      await fetch(GAS_URL + '?action=updateScore', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ rowIndex, openScore: score })
      });
      renderTeacherDashboard();
    };

    window.exportToCSV = async function() {
      const res = await fetch(GAS_URL + '?action=getResults');
      const results = await res.json();
      let csv = "Учень,Варіант,Закрита,Відкрита,Загалом,Час\n";
      results.forEach(r => {
        const total = r.openScore ? r.closedScore + r.openScore : r.closedScore;
        csv += `"${r.student}","${r.variant}",${r.closedScore},${r.openScore ?? ''},${total},"${r.timestamp}"\n`;
      });
      const blob = new Blob(["\uFEFF"+csv], {type: 'text/csv;charset=utf-8;'});
      const link = document.createElement('a');
      link.href = URL.createObjectURL(blob);
      link.download = 'results.csv';
      link.click();
    };

    // Старт
    renderLogin();
  })();
</script>
</body>
</html>
